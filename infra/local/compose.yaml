services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ons-sdmx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: local-api
    container_name: ons-sdmx-api
    environment:
      ONS_SDMX_DB_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      GOOGLE_GENAI_USE_ENTERPRISE: ${GOOGLE_GENAI_USE_ENTERPRISE:-True}
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:

